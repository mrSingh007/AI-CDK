<aside class="ai-sidebar" aria-label="AI chat sidebar">
  <header class="ai-sidebar__topbar">
    <button
      class="ai-sidebar__icon-button"
      type="button"
      aria-label="Clear conversation"
      (click)="onClearClick()"
    >
      <span aria-hidden="true">&#x1F5D1;</span>
    </button>

    <button
      class="ai-sidebar__icon-button"
      type="button"
      aria-label="Close sidebar"
      (click)="onCloseClick()"
    >
      <span aria-hidden="true">&#x2715;</span>
    </button>
  </header>

  <div #messagesContainer class="ai-sidebar__messages" role="log" aria-live="polite" aria-relevant="additions">
    @for (message of messages(); track message.id) {
      <div
        class="ai-sidebar__bubble"
        [class.ai-sidebar__bubble--user]="message.role === 'user'"
        [class.ai-sidebar__bubble--ai]="message.role === 'ai'"
        [class.ai-sidebar__bubble--error]="message.error"
      >
        <span class="ai-sidebar__bubble-text">{{ message.text }}</span>
        @if (message.streaming) {
          <span class="ai-sidebar__cursor" aria-hidden="true"></span>
        }
      </div>
    }
  </div>

  <footer class="ai-sidebar__input-bar">
    <input
      class="ai-sidebar__input"
      type="text"
      [placeholder]="placeholder()"
      [value]="inputMessage()"
      [disabled]="isStreaming() || disabled()"
      (input)="onMessageInput($event)"
      (keydown)="onEnterPress($event)"
    />

    <button
      class="ai-sidebar__send"
      type="button"
      [disabled]="isStreaming() || disabled()"
      aria-label="Send message"
      (click)="sendMessage()"
    >
      <span aria-hidden="true">&#x27A4;</span>
    </button>
  </footer>
</aside>
