name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    name: Build, Test, and Storybook
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure sandbox files are unchanged
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git diff --quiet "$PR_BASE_SHA...$PR_HEAD_SHA" -- \
              projects/storybook-host/src/sandbox.html \
              projects/storybook-host/src/sandbox.scss \
              projects/storybook-host/src/sandbox.ts
          else
            git diff --quiet "$PUSH_BEFORE_SHA" "$PUSH_SHA" -- \
              projects/storybook-host/src/sandbox.html \
              projects/storybook-host/src/sandbox.scss \
              projects/storybook-host/src/sandbox.ts
          fi || {
            echo "Sandbox files changed in this branch."
            echo "Run 'npm run sandbox:stash' and restore the sandbox files before committing."
            exit 1
          }

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Build Storybook
        run: npm run build-storybook
